name: Bug report
description: Create a report to help us improve
title: "[BUG] - "
type: bug
body:
  - type: markdown
    attributes: 
      value: |
        Thanks for taking the time to report a bug! Please fill in the details below to help us understand the issue and find a solution.
  - type: textarea
    id: bug-description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: "Describe the bug here..."
    validations:
      required: true
  - type: upload
    id: bug-screenshot
    attributes:
      label: Screenshot
      description: Please upload a screenshot of the behavior
    validations:
      required: true